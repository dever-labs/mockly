name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

# Deny all permissions by default; each job opts in to what it needs.
permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Unit + Integration tests ───────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Run tests
        run: go test ./internal/... -race

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Java tests
        run: mvn -B test -f clients/java/pom.xml

  # ─── UI build ───────────────────────────────────────────────────────────────
  ui:
    name: UI Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        run: npm ci
        working-directory: ui

      - name: Build UI
        run: npm run build
        working-directory: ui

      - name: Upload UI artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7.0.1
        with:
          name: ui-dist
          path: assets/dist/
          retention-days: 1

  # ─── E2E tests (requires built binary) ──────────────────────────────────────
  e2e:
    name: E2E Tests
    needs: [test, ui]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Download UI artifact
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # actions/download-artifact@v6
        with:
          name: ui-dist
          path: assets/dist/

      - name: Run E2E tests
        run: go test -tags e2e ./tests/e2e/... -v -timeout 120s

  # ─── Testcontainers integration tests ───────────────────────────────────────
  test-testcontainers:
    name: Testcontainers Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0

      - name: Pull Mockly Docker image
        run: docker pull ghcr.io/dever-labs/mockly:latest

      # Go
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Run Go testcontainers tests
        run: go test -tags integration ./... -timeout 120s
        working-directory: clients/go/testcontainers

      # Node
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        with:
          node-version: "22"

      - name: Run Node testcontainers tests
        run: npm ci && npm run test:integration
        working-directory: clients/node-testcontainers

      # Python
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run Python testcontainers tests
        run: pip install -e . && python -m pytest -m integration tests/ -v
        working-directory: clients/python-testcontainers

      # Rust
      - name: Install Rust stable
        run: rustup update stable && rustup default stable

      - name: Run Rust testcontainers tests
        run: cargo test -- --ignored --test-threads=1
        working-directory: clients/rust-testcontainers

      # Java
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run Java testcontainers tests
        run: mvn -B test -f clients/java/testcontainers/pom.xml
        env:
          TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock

      # .NET
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Run .NET testcontainers tests
        run: dotnet test clients/dotnet --filter "Category=Integration" -v minimal

  # ─── Cross-platform Go binaries ─────────────────────────────────────────────
  build:
    name: Build Binary (${{ matrix.goos }}-${{ matrix.goarch }})
    needs: [test, ui, test-testcontainers]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Download UI artifact
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # actions/download-artifact@v6
        with:
          name: ui-dist
          path: assets/dist/

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" \
            -o dist/mockly-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} \
            ./cmd/mockly

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7.0.1
        with:
          name: mockly-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  # ─── Release ────────────────────────────────────────────────────────────────
  release:
    name: Release
    needs: [build, e2e]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # actions/download-artifact@v6
        with:
          pattern: mockly-*
          merge-multiple: true
          path: dist/

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ github.ref_name }}" dist/* --clobber

  # ─── Publish NuGet package ──────────────────────────────────────────────────
  nuget-publish:
    name: Publish NuGet
    needs: [build, e2e]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
            11.0.x
          dotnet-quality: preview

      - name: Download all binaries
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # actions/download-artifact@v6
        with:
          pattern: mockly-*
          merge-multiple: true
          path: dist/

      - name: Stage binaries into NuGet runtimes/ structure
        run: |
          RUNTIMES=clients/dotnet/src/Mockly.Driver/runtimes
          cp dist/mockly-linux-amd64    $RUNTIMES/linux-x64/native/mockly
          cp dist/mockly-linux-arm64    $RUNTIMES/linux-arm64/native/mockly
          cp dist/mockly-darwin-amd64   $RUNTIMES/osx-x64/native/mockly
          cp dist/mockly-darwin-arm64   $RUNTIMES/osx-arm64/native/mockly
          cp dist/mockly-windows-amd64.exe $RUNTIMES/win-x64/native/mockly.exe
          chmod +x $RUNTIMES/*/native/mockly

      - name: Pack
        run: |
          dotnet pack clients/dotnet/src/Mockly.Driver/Mockly.Driver.csproj \
            -c Release \
            -o dist/nuget
          dotnet pack clients/dotnet/src/Testcontainers.Mockly/Testcontainers.Mockly.csproj \
            -c Release \
            -o dist/nuget

      - name: Push to NuGet.org
        run: |
          dotnet nuget push dist/nuget/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  # ─── Publish npm packages ────────────────────────────────────────────────────
  npm-publish:
    name: Publish npm
    needs: [build, e2e]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for provenance attestations
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all binaries
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # actions/download-artifact@v6
        with:
          pattern: mockly-*
          merge-multiple: true
          path: dist/

      - name: Stage binaries into platform sub-packages
        run: |
          PKG=clients/node/packages
          cp dist/mockly-linux-amd64       $PKG/mockly-driver-linux-x64/bin/mockly
          cp dist/mockly-linux-arm64       $PKG/mockly-driver-linux-arm64/bin/mockly
          cp dist/mockly-darwin-amd64      $PKG/mockly-driver-darwin-x64/bin/mockly
          cp dist/mockly-darwin-arm64      $PKG/mockly-driver-darwin-arm64/bin/mockly
          cp dist/mockly-windows-amd64.exe $PKG/mockly-driver-win32-x64/bin/mockly.exe
          chmod +x $PKG/mockly-driver-linux-*/bin/mockly $PKG/mockly-driver-darwin-*/bin/mockly

      - name: Publish platform sub-packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in clients/node/packages/*/; do
            npm publish "$pkg" --access public --provenance
          done

      - name: Build and publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: clients/node
        run: |
          npm install
          npm run build
          npm publish --access public --provenance

      - name: Build and publish testcontainers package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: clients/node-testcontainers
        run: |
          npm install
          npm run build
          npm publish --access public --provenance


  docker:
    name: Docker Image
    needs: [build, e2e]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push Docker image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          docker build -t "${IMAGE}:${TAG}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"

  # ─── Publish PyPI package ────────────────────────────────────────────────────
  python-publish:
    name: Publish PyPI
    needs: [build, e2e]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for OIDC Trusted Publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0

      - name: Build wheel and sdist
        run: |
          pip install hatch
          cd clients/python && hatch build

      - name: Publish to PyPI
        run: |
          pip install twine
          twine upload --non-interactive clients/python/dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - name: Build testcontainers wheel and sdist
        run: |
          cd clients/python-testcontainers && hatch build

      - name: Publish testcontainers to PyPI
        run: twine upload --non-interactive clients/python-testcontainers/dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # ─── Publish Maven Central package ──────────────────────────────────────────
  java-publish:
    name: Publish Maven Central
    needs: [build, e2e]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN

      - name: Import GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Deploy to Maven Central
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B deploy -Prelease -f clients/java/pom.xml -DskipTests

      - name: Deploy testcontainers to Maven Central
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B deploy -Prelease -f clients/java/testcontainers/pom.xml -DskipTests

  rust-publish:
    name: Publish crates.io
    needs: [build, e2e]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0

      - name: Install Rust stable
        run: rustup update stable && rustup default stable

      - name: Publish driver to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --manifest-path clients/rust/Cargo.toml --allow-dirty

      - name: Wait for crates.io to index driver
        run: sleep 30

      - name: Publish testcontainers to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --manifest-path clients/rust-testcontainers/Cargo.toml --allow-dirty
