openapi: "3.1.0"
info:
  title: Mockly Management API
  description: |
    REST API for managing Mockly's HTTP, WebSocket, gRPC, GraphQL, TCP, Redis, SMTP, MQTT, SNMP, DNS, AMQP, Kafka, LDAP, IMAP, FTP, Memcached, STOMP, CoAP, and SIP servers at runtime.
    All endpoints are served on the management port (default: **9091**).
  version: "1.0.0"
  license:
    name: MIT

servers:
  - url: http://localhost:9091
    description: Local Mockly instance (default)

tags:
  - name: System
    description: Health, protocol status, and global reset
  - name: HTTP Mocks
    description: Manage HTTP mock definitions
  - name: WebSocket Mocks
    description: Manage WebSocket mock definitions
  - name: gRPC Mocks
    description: Manage gRPC mock definitions
  - name: GraphQL Mocks
    description: Manage GraphQL mock definitions
  - name: TCP Mocks
    description: Manage TCP mock definitions
  - name: Redis Mocks
    description: Manage Redis mock definitions
  - name: SMTP Mocks
    description: Manage SMTP rules and captured email inbox
  - name: MQTT Mocks
    description: Manage MQTT mock definitions and captured messages
  - name: SNMP Mocks
    description: Manage SNMP OID mock definitions and outbound TRAP configurations
  - name: DNS Mocks
    description: Manage DNS record mocks
  - name: AMQP Mocks
    description: Manage AMQP publish/consume mocks and captured messages
  - name: Kafka Mocks
    description: Manage Kafka topic mocks and captured messages
  - name: LDAP Mocks
    description: Manage LDAP bind/search mocks
  - name: IMAP Mocks
    description: Manage IMAP mailboxes and messages
  - name: FTP Mocks
    description: Manage FTP files
  - name: Memcached Mocks
    description: Manage Memcached command mocks
  - name: STOMP Mocks
    description: Manage STOMP destination mocks and captured messages
  - name: CoAP Mocks
    description: Manage CoAP request/response mocks
  - name: SIP Mocks
    description: Manage SIP method/URI mocks
  - name: State
    description: Shared key-value state used by state-conditional mocks
  - name: Scenarios
    description: Named sets of mock patches and protocol faults for deterministic testing
  - name: Fault Injection
    description: Protocol-native direct fault injection
  - name: Logs
    description: Request/response log access and streaming
  - name: Call Verification
    description: HTTP mock call counts and wait-for-call helpers

paths:
  # ---------------------------------------------------------------------------
  # System
  # ---------------------------------------------------------------------------
  /api/health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/protocols:
    get:
      tags: [System]
      operationId: listProtocols
      summary: List active protocol servers and their status
      responses:
        "200":
          description: Array of protocol status objects
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true

  /api/reset:
    post:
      tags: [System]
      operationId: reset
      summary: Reset all mocks, state, scenarios, and call counts to their startup values
      responses:
        "200":
          description: Reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusMessage"

  # ---------------------------------------------------------------------------
  # HTTP Mocks
  # ---------------------------------------------------------------------------
  /api/mocks/http:
    get:
      tags: [HTTP Mocks]
      operationId: listHTTPMocks
      summary: List all HTTP mocks
      responses:
        "200":
          description: Array of HTTP mocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HTTPMock"
    post:
      tags: [HTTP Mocks]
      operationId: addHTTPMock
      summary: Create an HTTP mock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HTTPMock"
            examples:
              simple:
                summary: Simple GET mock
                value:
                  id: get-users
                  request:
                    method: GET
                    path: /users
                  response:
                    status: 200
                    headers:
                      Content-Type: application/json
                    body: '[{"id":1,"name":"Alice"}]'
      responses:
        "201":
          description: Mock created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPMock"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/mocks/http/{id}:
    put:
      tags: [HTTP Mocks]
      operationId: updateHTTPMock
      summary: Replace an HTTP mock
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HTTPMock"
      responses:
        "200":
          description: Mock updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPMock"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [HTTP Mocks]
      operationId: patchHTTPMock
      summary: Partially update an HTTP mock response
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HTTPResponsePatch"
            examples:
              status:
                summary: Temporarily change status code
                value:
                  status: 503
      responses:
        "200":
          description: Mock patched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPMock"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [HTTP Mocks]
      operationId: deleteHTTPMock
      summary: Delete an HTTP mock
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/Deleted"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # WebSocket Mocks
  # ---------------------------------------------------------------------------
  /api/mocks/websocket:
    get:
      tags: [WebSocket Mocks]
      operationId: listWSMocks
      summary: List all WebSocket mocks
      responses:
        "200":
          description: Array of WebSocket mocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebSocketMock"
    post:
      tags: [WebSocket Mocks]
      operationId: addWSMock
      summary: Create a WebSocket mock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebSocketMock"
            examples:
              simple:
                summary: Echo WebSocket mock
                value:
                  id: ws-echo
                  path: /ws/echo
                  on_connect:
                    send: '{"status":"connected"}'
                  on_message:
                    - match: ping
                      respond: pong
      responses:
        "201":
          description: Mock created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebSocketMock"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/mocks/websocket/{id}:
    put:
      tags: [WebSocket Mocks]
      operationId: updateWSMock
      summary: Replace a WebSocket mock
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebSocketMock"
      responses:
        "200":
          description: Mock updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebSocketMock"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [WebSocket Mocks]
      operationId: patchWSMock
      summary: Partially update a WebSocket mock on_connect behaviour
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WSOnConnectPatch"
      responses:
        "200":
          description: Mock patched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebSocketMock"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [WebSocket Mocks]
      operationId: deleteWSMock
      summary: Delete a WebSocket mock
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/Deleted"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # gRPC Mocks
  # ---------------------------------------------------------------------------
  /api/mocks/grpc:
    get:
      tags: [gRPC Mocks]
      operationId: listGRPCMocks
      summary: List all gRPC mocks
      responses:
        "200":
          description: Array of gRPC mocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GRPCMock"
    post:
      tags: [gRPC Mocks]
      operationId: addGRPCMock
      summary: Create a gRPC mock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GRPCMock"
            examples:
              simple:
                summary: SayHello mock
                value:
                  id: say-hello
                  method: SayHello
                  response:
                    message: Hello from Mockly
      responses:
        "201":
          description: Mock created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GRPCMock"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/mocks/grpc/{id}:
    put:
      tags: [gRPC Mocks]
      operationId: updateGRPCMock
      summary: Replace a gRPC mock
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GRPCMock"
      responses:
        "200":
          description: Mock updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GRPCMock"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [gRPC Mocks]
      operationId: patchGRPCMock
      summary: Partially update a gRPC mock response
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GRPCResponsePatch"
      responses:
        "200":
          description: Mock patched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GRPCMock"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [gRPC Mocks]
      operationId: deleteGRPCMock
      summary: Delete a gRPC mock
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/Deleted"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # GraphQL Mocks
  # ---------------------------------------------------------------------------
  /api/mocks/graphql:
    get:
      tags: [GraphQL Mocks]
      operationId: listGraphQLMocks
      summary: List all GraphQL mocks
      responses:
        "200":
          description: Array of GraphQL mocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GraphQLMock"
    post:
      tags: [GraphQL Mocks]
      operationId: addGraphQLMock
      summary: Create a GraphQL mock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GraphQLMock"
            examples:
              simple:
                summary: Query mock
                value:
                  id: gql-users
                  operation_type: query
                  operation_name: GetUsers
                  response:
                    users:
                      - id: "1"
                        name: Alice
      responses:
        "201":
          description: Mock created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphQLMock"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/mocks/graphql/{id}:
    put:
      tags: [GraphQL Mocks]
      operationId: updateGraphQLMock
      summary: Replace a GraphQL mock
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GraphQLMock"
      responses:
        "200":
          description: Mock updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphQLMock"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [GraphQL Mocks]
      operationId: deleteGraphQLMock
      summary: Delete a GraphQL mock
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/Deleted"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # TCP Mocks
  # ---------------------------------------------------------------------------
  /api/mocks/tcp:
    get:
      tags: [TCP Mocks]
      operationId: listTCPMocks
      summary: List all TCP mocks
      responses:
        "200":
          description: Array of TCP mocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TCPMock"
    post:
      tags: [TCP Mocks]
      operationId: addTCPMock
      summary: Create a TCP mock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TCPMock"
            examples:
              simple:
                summary: Respond to PING
                value:
                  id: tcp-ping
                  match: PING
                  response: PONG
      responses:
        "201":
          description: Mock created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TCPMock"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/mocks/tcp/{id}:
    put:
      tags: [TCP Mocks]
      operationId: updateTCPMock
      summary: Replace a TCP mock
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TCPMock"
      responses:
        "200":
          description: Mock updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TCPMock"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [TCP Mocks]
      operationId: deleteTCPMock
      summary: Delete a TCP mock
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/Deleted"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Redis Mocks
  # ---------------------------------------------------------------------------
  /api/mocks/redis:
    get:
      tags: [Redis Mocks]
      operationId: listRedisMocks
      summary: List all Redis mocks
      responses:
        "200":
          description: Array of Redis mocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RedisMock"
    post:
      tags: [Redis Mocks]
      operationId: addRedisMock
      summary: Create a Redis mock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedisMock"
            examples:
              simple:
                summary: GET key mock
                value:
                  id: redis-get-user
                  command: GET
                  key: "user:*"
                  response:
                    type: bulk
                    value: '{"id":1,"name":"Alice"}'
      responses:
        "201":
          description: Mock created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedisMock"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/mocks/redis/{id}:
    put:
      tags: [Redis Mocks]
      operationId: updateRedisMock
      summary: Replace a Redis mock
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedisMock"
      responses:
        "200":
          description: Mock updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedisMock"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Redis Mocks]
      operationId: deleteRedisMock
      summary: Delete a Redis mock
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/Deleted"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # SMTP Mocks
  # ---------------------------------------------------------------------------
  /api/mocks/smtp:
    get:
      tags: [SMTP Mocks]
      operationId: listSMTPRules
      summary: List all SMTP rules
      responses:
        "200":
          description: Array of SMTP rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SMTPRule"
    post:
      tags: [SMTP Mocks]
      operationId: addSMTPRule
      summary: Create an SMTP rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SMTPRule"
            examples:
              reject:
                summary: Reject mail from unknown senders
                value:
                  id: smtp-reject-spam
                  from: "re:.*@spam\\.example\\.com"
                  action: reject
                  message: "550 Rejected"
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SMTPRule"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/mocks/smtp/{id}:
    put:
      tags: [SMTP Mocks]
      operationId: updateSMTPRule
      summary: Replace an SMTP rule
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SMTPRule"
      responses:
        "200":
          description: Rule updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SMTPRule"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [SMTP Mocks]
      operationId: deleteSMTPRule
      summary: Delete an SMTP rule
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/Deleted"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/emails:
    get:
      tags: [SMTP Mocks]
      operationId: listEmails
      summary: List all emails captured in the SMTP inbox
      responses:
        "200":
          description: Array of captured emails
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReceivedEmail"
    delete:
      tags: [SMTP Mocks]
      operationId: clearEmails
      summary: Clear the SMTP inbox
      responses:
        "200":
          description: Inbox cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusMessage"

  # ---------------------------------------------------------------------------
  # MQTT Mocks
  # ---------------------------------------------------------------------------
  /api/mocks/mqtt:
    get:
      tags: [MQTT Mocks]
      operationId: listMQTTMocks
      summary: List all MQTT mocks
      responses:
        "200":
          description: Array of MQTT mocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MQTTMock"
    post:
      tags: [MQTT Mocks]
      operationId: addMQTTMock
      summary: Create an MQTT mock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MQTTMock"
            examples:
              simple:
                summary: Respond to sensor topic
                value:
                  id: mqtt-sensor
                  topic: "sensors/+"
                  response:
                    topic: "sensors/response"
                    payload: '{"ack":true}'
                    qos: 0
      responses:
        "201":
          description: Mock created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MQTTMock"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/mocks/mqtt/{id}:
    put:
      tags: [MQTT Mocks]
      operationId: updateMQTTMock
      summary: Replace an MQTT mock
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MQTTMock"
      responses:
        "200":
          description: Mock updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MQTTMock"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [MQTT Mocks]
      operationId: deleteMQTTMock
      summary: Delete an MQTT mock
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/Deleted"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/mqtt/messages:
    get:
      tags: [MQTT Mocks]
      operationId: listMQTTMessages
      summary: List all captured MQTT messages
      responses:
        "200":
          description: Array of captured messages
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
    delete:
      tags: [MQTT Mocks]
      operationId: clearMQTTMessages
      summary: Clear captured MQTT messages
      responses:
        "200":
          description: Messages cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusMessage"

  # ---------------------------------------------------------------------------
  # SNMP Mocks
  # ---------------------------------------------------------------------------
  /api/mocks/snmp:
    get:
      tags: [SNMP Mocks]
      operationId: listSNMPMocks
      summary: List all SNMP OID mocks
      responses:
        "200":
          description: Array of SNMP mocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SNMPMock"
    post:
      tags: [SNMP Mocks]
      operationId: addSNMPMock
      summary: Add an SNMP OID mock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SNMPMock"
            examples:
              string_oid:
                summary: System description string OID
                value:
                  id: sys-descr
                  oid: "1.3.6.1.2.1.1.1.0"
                  type: string
                  value: "Mockly Virtual Device"
      responses:
        "201":
          description: Mock created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SNMPMock"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/mocks/snmp/{id}:
    put:
      tags: [SNMP Mocks]
      operationId: updateSNMPMock
      summary: Replace an SNMP OID mock
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SNMPMock"
      responses:
        "200":
          description: Mock updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SNMPMock"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [SNMP Mocks]
      operationId: deleteSNMPMock
      summary: Delete an SNMP OID mock
      parameters:
        - name: id
          in: path
          required: true
