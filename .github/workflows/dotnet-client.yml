name: .NET client CI

on:
  push:
    branches: [main]
    paths:
      - 'clients/dotnet/**'
  pull_request:
    paths:
      - 'clients/dotnet/**'
  workflow_dispatch:

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: clients/dotnet

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
            11.0.x
          dotnet-quality: preview

      - name: Build
        run: dotnet build

      - name: Test
        run: dotnet test
