name: Java client CI

on:
  push:
    branches: [main]
    paths:
      - 'clients/java/**'
  pull_request:
    paths:
      - 'clients/java/**'

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/java

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        run: mvn -B verify
