name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

# Deny all permissions by default; each job opts in to what it needs.
permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Unit + Integration tests ───────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: false

      - name: Run tests
        run: go test ./internal/... -race

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Run Java tests
        run: mvn -B test -f clients/java/pom.xml

  # ─── UI build ───────────────────────────────────────────────────────────────
  ui:
    name: UI Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # actions/setup-node@v6.3.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        run: npm ci
        working-directory: ui

      - name: Build UI
        run: npm run build
        working-directory: ui

      - name: Upload UI artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # actions/upload-artifact@v7.0.0
        with:
          name: ui-dist
          path: assets/dist/
          retention-days: 1

  # ─── E2E tests (requires built binary) ──────────────────────────────────────
  e2e:
    name: E2E Tests
    needs: [test, ui]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: false

      - name: Download UI artifact
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # actions/download-artifact@v6
        with:
          name: ui-dist
          path: assets/dist/

      - name: Run E2E tests
        run: go test -tags e2e ./tests/e2e/... -v -timeout 120s

  # ─── Cross-platform Go binaries ─────────────────────────────────────────────
  build:
    name: Build Binary (${{ matrix.goos }}-${{ matrix.goarch }})
    needs: [test, ui]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: false

      - name: Download UI artifact
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # actions/download-artifact@v6
        with:
          name: ui-dist
          path: assets/dist/

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" \
            -o dist/mockly-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} \
            ./cmd/mockly

      - name: Upload binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # actions/upload-artifact@v7.0.0
        with:
          name: mockly-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  # ─── Release ────────────────────────────────────────────────────────────────
  release:
    name: Release
    needs: [build, e2e]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # actions/download-artifact@v6
        with:
          pattern: mockly-*
          merge-multiple: true
          path: dist/

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ github.ref_name }}" dist/* --clobber

  # ─── Publish NuGet package ──────────────────────────────────────────────────
  nuget-publish:
    name: Publish NuGet
    needs: [build, e2e]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.x

      - name: Download all binaries
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # actions/download-artifact@v6
        with:
          pattern: mockly-*
          merge-multiple: true
          path: dist/

      - name: Stage binaries into NuGet runtimes/ structure
        run: |
          RUNTIMES=clients/dotnet/src/Mockly.Driver/runtimes
          cp dist/mockly-linux-amd64    $RUNTIMES/linux-x64/native/mockly
          cp dist/mockly-linux-arm64    $RUNTIMES/linux-arm64/native/mockly
          cp dist/mockly-darwin-amd64   $RUNTIMES/osx-x64/native/mockly
          cp dist/mockly-darwin-arm64   $RUNTIMES/osx-arm64/native/mockly
          cp dist/mockly-windows-amd64.exe $RUNTIMES/win-x64/native/mockly.exe
          chmod +x $RUNTIMES/*/native/mockly

      - name: Pack
        run: |
          dotnet pack clients/dotnet/src/Mockly.Driver/Mockly.Driver.csproj \
            -c Release \
            -o dist/nuget \
            /p:Version=${{ github.ref_name }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push dist/nuget/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json

  # ─── Publish npm packages ────────────────────────────────────────────────────
  npm-publish:
    name: Publish npm
    needs: [build, e2e]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for provenance attestations
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # actions/setup-node@v6.3.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all binaries
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # actions/download-artifact@v6
        with:
          pattern: mockly-*
          merge-multiple: true
          path: dist/

      - name: Stage binaries into platform sub-packages
        run: |
          PKG=clients/node/packages
          cp dist/mockly-linux-amd64       $PKG/mockly-driver-linux-x64/bin/mockly
          cp dist/mockly-linux-arm64       $PKG/mockly-driver-linux-arm64/bin/mockly
          cp dist/mockly-darwin-amd64      $PKG/mockly-driver-darwin-x64/bin/mockly
          cp dist/mockly-darwin-arm64      $PKG/mockly-driver-darwin-arm64/bin/mockly
          cp dist/mockly-windows-amd64.exe $PKG/mockly-driver-win32-x64/bin/mockly.exe
          chmod +x $PKG/mockly-driver-linux-*/bin/mockly $PKG/mockly-driver-darwin-*/bin/mockly

      - name: Set version in all packages
        run: |
          VERSION=${{ github.ref_name }}
          for pkg in clients/node/packages/*/; do
            node -e "
              const fs = require('fs');
              const p = '$pkg/package.json';
              const j = JSON.parse(fs.readFileSync(p));
              j.version = process.argv[1];
              fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
            " "$VERSION"
          done
          node -e "
            const fs = require('fs');
            const p = 'clients/node/package.json';
            const j = JSON.parse(fs.readFileSync(p));
            j.version = process.argv[1];
            for (const k of Object.keys(j.optionalDependencies ?? {})) {
              j.optionalDependencies[k] = process.argv[1];
            }
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          " "$VERSION"

      - name: Publish platform sub-packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in clients/node/packages/*/; do
            npm publish "$pkg" --access public --provenance
          done

      - name: Build and publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: clients/node
        run: |
          npm ci
          npm run build
          npm publish --access public --provenance


  docker:
    name: Docker Image
    needs: [build, e2e]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push Docker image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          docker build -t "${IMAGE}:${TAG}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"

  # ─── Publish PyPI package ────────────────────────────────────────────────────
  python-publish:
    name: Publish PyPI
    needs: [build, e2e]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for OIDC Trusted Publishing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Set version
        run: |
          VERSION="${{ github.ref_name }}"
          SEMVER="${VERSION#v}"
          sed -i "s/^version = \".*\"/version = \"${SEMVER}\"/" clients/python/pyproject.toml

      - name: Build wheel and sdist
        run: |
          pip install hatch
          cd clients/python && hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4
        with:
          packages-dir: clients/python/dist/

  # ─── Publish Maven Central package ──────────────────────────────────────────
  java-publish:
    name: Publish Maven Central
    needs: [build, e2e]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN

      - name: Import GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Set version
        run: |
          VERSION="${{ github.ref_name }}"
          SEMVER="${VERSION#v}"
          mvn -B versions:set -DnewVersion="${SEMVER}" -DgenerateBackupPoms=false \
            -f clients/java/pom.xml
          sed -i "s/DEFAULT_VERSION = \"v[^\"]*\"/DEFAULT_VERSION = \"${VERSION}\"/" \
            clients/java/src/main/java/io/mockly/driver/MocklyInstaller.java

      - name: Deploy to Maven Central
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B deploy -f clients/java/pom.xml -DskipTests -Dgpg.passphrase="${MAVEN_GPG_PASSPHRASE}"
