name: Node client CI

on:
  push:
    branches: [main]
    paths:
      - 'clients/node/**'
  pull_request:
    paths:
      - 'clients/node/**'
  workflow_dispatch:

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: clients/node

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: clients/node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
