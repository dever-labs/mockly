name: Node client CI

on:
  push:
    branches: [main]
    paths:
      - 'clients/node/**'
      - 'clients/node-testcontainers/**'
  pull_request:
    paths:
      - 'clients/node/**'
      - 'clients/node-testcontainers/**'
  workflow_dispatch:

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: clients/node

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: clients/node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  ci-testcontainers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: clients/node-testcontainers

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: clients/node-testcontainers/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
