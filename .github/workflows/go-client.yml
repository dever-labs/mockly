name: Go client CI

on:
  push:
    branches: [main]
    paths:
      - 'clients/go/**'
  pull_request:
    paths:
      - 'clients/go/**'
  workflow_dispatch:

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: clients/go

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.21'
          cache-dependency-path: clients/go/go.mod

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  ci-testcontainers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: clients/go/testcontainers

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.22'
          cache-dependency-path: clients/go/testcontainers/go.sum

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...
