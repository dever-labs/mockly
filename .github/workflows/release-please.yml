name: Release Please

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json

      # When a release PR is created/updated, regenerate npm lock files on that branch
      # so that `npm ci` stays in sync with the version-bumped package.json files.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0
        if: ${{ steps.release.outputs.pr }}
        with:
          ref: ${{ fromJson(steps.release.outputs.pr).headBranchName }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        if: ${{ steps.release.outputs.pr }}
        with:
          node-version: "22"

      - name: Sync npm lock files to new version
        if: ${{ steps.release.outputs.pr }}
        run: |
          VERSION=$(node -p "require('./clients/node/package.json').version")

          # Update only the mockly-driver-* optional packages in the clients/node lock file.
          # Specifying packages explicitly prevents npm from drifting other dep versions.
          (cd clients/node && npm install --package-lock-only \
            "@dever-labs/mockly-driver-linux-x64@$VERSION" \
            "@dever-labs/mockly-driver-linux-arm64@$VERSION" \
            "@dever-labs/mockly-driver-darwin-x64@$VERSION" \
            "@dever-labs/mockly-driver-darwin-arm64@$VERSION" \
            "@dever-labs/mockly-driver-win32-x64@$VERSION")

          # node-testcontainers has no driver deps — only the root version metadata needs updating.
          (cd clients/node-testcontainers && \
            jq --arg v "$VERSION" '.version = $v | .packages[""].version = $v' package-lock.json \
            > package-lock.json.tmp && mv package-lock.json.tmp package-lock.json)

      - name: Commit lock file updates
        if: ${{ steps.release.outputs.pr }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clients/node/package-lock.json clients/node-testcontainers/package-lock.json
          git diff --staged --quiet || git commit -m "chore: regenerate npm lock files for version bump"
          git push
