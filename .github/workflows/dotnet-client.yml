name: .NET client CI

on:
  push:
    branches: [main]
    paths:
      - 'clients/dotnet/**'
  pull_request:
    paths:
      - 'clients/dotnet/**'

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/dotnet

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Build
        run: dotnet build

      - name: Test
        run: dotnet test
