name: Rust client CI

on:
  push:
    branches: [main]
    paths:
      - 'clients/rust/**'
      - 'clients/rust-testcontainers/**'
  pull_request:
    paths:
      - 'clients/rust/**'
      - 'clients/rust-testcontainers/**'
  workflow_dispatch:

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: clients/rust

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Install Rust stable
        run: rustup update stable && rustup default stable

      - name: Check
        run: cargo check

      - name: Test
        run: cargo test --lib

  ci-testcontainers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: clients/rust-testcontainers

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Install Rust stable
        run: rustup update stable && rustup default stable

      - name: Check
        run: cargo check

      - name: Test
        run: cargo test --lib
