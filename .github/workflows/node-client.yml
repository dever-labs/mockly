name: Node client CI

on:
  push:
    branches: [main]
    paths:
      - 'clients/node/**'
      - 'clients/node-testcontainers/**'
  pull_request:
    paths:
      - 'clients/node/**'
      - 'clients/node-testcontainers/**'
  workflow_dispatch:

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: clients/node

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: clients/node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  ci-testcontainers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: clients/node-testcontainers

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: clients/node-testcontainers/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
