name: .NET client CI

on:
  push:
    branches: [main]
    paths:
      - 'clients/dotnet/**'
  pull_request:
    paths:
      - 'clients/dotnet/**'
  workflow_dispatch:

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: clients/dotnet

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
            11.0.x
          dotnet-quality: preview

      - name: Build
        run: dotnet build

      - name: Test
        run: dotnet test
