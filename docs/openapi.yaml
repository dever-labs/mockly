      tags: [Scenarios]
      operationId: getScenario
      summary: Get a scenario by ID
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Scenario found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scenario"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Scenarios]
      operationId: updateScenario
      summary: Replace a scenario
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Scenario"
      responses:
        "200":
          description: Scenario updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scenario"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Scenarios]
      operationId: deleteScenario
      summary: Delete a scenario
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/Deleted"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/scenarios/{id}/activate:
    post:
      tags: [Scenarios]
      operationId: activateScenario
      summary: Activate a scenario
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Scenario activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  activated:
                    type: string
                  active:
                    type: array
                    items:
                      type: string
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Scenarios]
      operationId: deactivateScenario
      summary: Deactivate a scenario
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Scenario deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  deactivated:
                    type: string
                  active:
                    type: array
                    items:
                      type: string

  /api/scenarios/{id}/deactivate:
    post:
      tags: [Scenarios]
      operationId: deactivateScenarioPost
      summary: Deactivate a scenario (POST alias)
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Scenario deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  deactivated:
                    type: string
                  active:
                    type: array
                    items:
                      type: string

  # ---------------------------------------------------------------------------
  # Fault Injection
  # ---------------------------------------------------------------------------
  /api/fault:
    get:
      tags: [Fault Injection]
      operationId: getAllFaults
      summary: Get all active direct protocol faults
      responses:
        "200":
          description: Active direct faults keyed by protocol
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtocolFaults"
    delete:
      tags: [Fault Injection]
      operationId: clearAllFaults
      summary: Clear all direct protocol faults
      responses:
        "204":
          description: All faults cleared

  /api/fault/{protocol}:
    get:
      tags: [Fault Injection]
      operationId: getProtocolFault
      summary: Get direct fault config for a protocol
      parameters:
        - $ref: "#/components/parameters/protocol"
      responses:
        "200":
          description: Fault config for the selected protocol, or null when not set
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/HTTPFault"
                  - $ref: "#/components/schemas/WebSocketFault"
                  - $ref: "#/components/schemas/GRPCFault"
                  - $ref: "#/components/schemas/TCPFault"
                  - $ref: "#/components/schemas/RedisFault"
                  - $ref: "#/components/schemas/MQTTFault"
                  - $ref: "#/components/schemas/SMTPFault"
                  - $ref: "#/components/schemas/SNMPFault"
                  - $ref: "#/components/schemas/DNSFault"
                  - $ref: "#/components/schemas/AMQPFault"
                  - $ref: "#/components/schemas/KafkaFault"
                  - $ref: "#/components/schemas/LDAPFault"
                  - $ref: "#/components/schemas/IMAPFault"
                  - $ref: "#/components/schemas/FTPFault"
                  - $ref: "#/components/schemas/MemcachedFault"
                  - $ref: "#/components/schemas/STOMPFault"
                  - $ref: "#/components/schemas/CoAPFault"
                  - $ref: "#/components/schemas/SIPFault"
                  - type: "null"
    post:
      tags: [Fault Injection]
      operationId: setProtocolFault
      summary: Set direct fault config for a protocol
      parameters:
        - $ref: "#/components/parameters/protocol"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/HTTPFault"
                - $ref: "#/components/schemas/WebSocketFault"
                - $ref: "#/components/schemas/GRPCFault"
                - $ref: "#/components/schemas/TCPFault"
                - $ref: "#/components/schemas/RedisFault"
                - $ref: "#/components/schemas/MQTTFault"
                - $ref: "#/components/schemas/SMTPFault"
                - $ref: "#/components/schemas/SNMPFault"
                - $ref: "#/components/schemas/DNSFault"
                - $ref: "#/components/schemas/AMQPFault"
                - $ref: "#/components/schemas/KafkaFault"
                - $ref: "#/components/schemas/LDAPFault"
                - $ref: "#/components/schemas/IMAPFault"
                - $ref: "#/components/schemas/FTPFault"
                - $ref: "#/components/schemas/MemcachedFault"
                - $ref: "#/components/schemas/STOMPFault"
                - $ref: "#/components/schemas/CoAPFault"
                - $ref: "#/components/schemas/SIPFault"
      responses:
        "200":
          description: Fault config stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusMessage"
        "400":
          $ref: "#/components/responses/BadRequest"
    delete:
      tags: [Fault Injection]
      operationId: clearProtocolFault
      summary: Clear direct fault config for a protocol
      parameters:
        - $ref: "#/components/parameters/protocol"
      responses:
        "204":
          description: Fault cleared for protocol

  # ---------------------------------------------------------------------------
  # Logs
  # ---------------------------------------------------------------------------
  /api/logs:
    get:
      tags: [Logs]
      operationId: getLogs
      summary: Get captured request/response logs
      description: Get recent log entries across all protocols. Optionally filter results by matched mock ID.
      parameters:
        - name: matched_id
          in: query
          required: false
          description: Return only log entries captured for the given mock ID.
          schema:
            type: string
      responses:
        "200":
          description: Array of log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
    delete:
      tags: [Logs]
      operationId: clearLogs
      summary: Clear all captured logs
      responses:
        "200":
          description: Logs cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusMessage"

  /api/logs/count:
    get:
      tags: [Logs]
      operationId: countLogs
      summary: Count captured request/response logs
      description: Count recent log entries across all protocols. Optionally filter by matched mock ID.
      parameters:
        - name: matched_id
          in: query
          required: false
          description: Count only log entries captured for the given mock ID.
          schema:
            type: string
      responses:
        "200":
          description: Log entry count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    format: int64
                required: [count]

  /api/logs/stream:
    get:
      tags: [Logs]
      operationId: streamLogs
      summary: Stream logs as Server-Sent Events
      responses:
        "200":
          description: SSE stream of log entries
          content:
            text/event-stream:
              schema:
                type: string

  # ---------------------------------------------------------------------------
  # Call Verification
  # ---------------------------------------------------------------------------
  /api/calls/http/{mockId}:
    get:
      tags: [Call Verification]
      operationId: getHTTPCalls
      summary: Get call count and details for an HTTP mock
      parameters:
        - name: mockId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Call count information
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    delete:
      tags: [Call Verification]
      operationId: clearHTTPMockCalls
      summary: Reset call count for a specific HTTP mock
      parameters:
        - name: mockId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/Deleted"

  /api/calls/http:
    delete:
      tags: [Call Verification]
      operationId: clearAllHTTPCalls
      summary: Reset call counts for all HTTP mocks
      responses:
        "200":
          description: All call counts cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusMessage"

  /api/calls/http/{mockId}/wait:
    post:
      tags: [Call Verification]
      operationId: waitHTTPCalls
      summary: Block until a mock has been called at least N times (or timeout)
      parameters:
        - name: mockId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                count:
                  type: integer
                  description: Minimum number of calls to wait for
                  example: 1
                timeout:
                  type: string
                  description: Max wait duration (Go duration string)
                  example: "5s"
      responses:
        "200":
          description: Call count reached
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "408":
          description: Timeout waiting for calls
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Mock or resource ID
    protocol:
      name: protocol
      in: path
      required: true
      schema:
        type: string
        enum: [http, graphql, websocket, grpc, tcp, redis, mqtt, smtp, snmp, dns, amqp, kafka, ldap, imap, ftp, memcached, stomp, coap, sip]
      description: Protocol name

  responses:
    BadRequest:
      description: Invalid request body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Deleted:
      description: Resource deleted
      content:
        application/json:
          schema:
            type: object
            properties:
              deleted:
                type: string

  schemas:
    # ── Primitives ─────────────────────────────────────────────────────────────
    Duration:
      type: string
      description: Go duration string (e.g. "500ms", "1s", "2m")
      example: "500ms"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

    StatusMessage:
      type: object
      properties:
        status:
          type: string

    StateCondition:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
          description: State key name
        value:
          type: string
          description: Required state value for this mock to match

    # ── HTTP ──────────────────────────────────────────────────────────────────
    HTTPRequest:
      type: object
      required: [method, path]
      properties:
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS]
          example: GET
        path:
          type: string
          description: URL path (exact or with wildcards)
          example: /users/{id}
        headers:
          type: object
          additionalProperties:
            type: string
          description: Required request headers (exact match)
        body:
          type: string
          description: Required request body (exact or wildcard match)
        query:
          type: object
          additionalProperties:
            type: string
          description: Required query params ("*" for wildcard value)
        body_json:
          type: object
          additionalProperties:
            type: string
          description: Match JSON body fields using dot-notation paths

    HTTPResponse:
      type: object
      required: [status]
      properties:
        status:
          type: integer
          example: 200
        headers:
          type: object
          additionalProperties:
            type: string
        body:
          type: string
          description: Response body (supports Go template variables)
        delay:
          $ref: "#/components/schemas/Duration"

    MockFault:
      type: object
      properties:
        delay:
          $ref: "#/components/schemas/Duration"
        status_override:
          type: integer
        body:
          type: string
        error_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    HTTPMock:
      type: object
      required: [request, response]
      properties:
        id:
          type: string
          description: Unique ID (auto-generated if omitted)
        request:
          $ref: "#/components/schemas/HTTPRequest"
        response:
          $ref: "#/components/schemas/HTTPResponse"
        state:
          $ref: "#/components/schemas/StateCondition"
        sequence:
          type: array
          items:
            $ref: "#/components/schemas/HTTPResponse"
          description: Cycled responses — returned in order on successive calls
        sequence_exhausted:
          type: string
          enum: [loop, hold_last, not_found]
          description: "Behaviour when sequence is exhausted (default: hold_last)"
        fault:
          $ref: "#/components/schemas/MockFault"

    HTTPResponsePatch:
      type: object
      properties:
        status:
          type: integer
        headers:
          type: object
          additionalProperties:
            type: string
        body:
          type: string
        delay:
          $ref: "#/components/schemas/Duration"

    # ── WebSocket ─────────────────────────────────────────────────────────────
    WebSocketAction:
      type: object
      properties:
        send:
          type: string
          description: Message to send
        delay:
          $ref: "#/components/schemas/Duration"

    WebSocketRule:
      type: object
      required: [match]
      properties:
        match:
          type: string
          description: Incoming message to match (exact, "re:…" regex, or "*")
        respond:
          type: string
          description: Message to send back
        close:
          type: boolean
          description: Close connection after responding
        delay:
          $ref: "#/components/schemas/Duration"

    WebSocketMock:
      type: object
      required: [path]
      properties:
        id:
          type: string
        path:
          type: string
          description: WebSocket path to mount (e.g. /ws/chat)
        on_connect:
          $ref: "#/components/schemas/WebSocketAction"
        on_message:
          type: array
          items:
            $ref: "#/components/schemas/WebSocketRule"
        state:
          $ref: "#/components/schemas/StateCondition"

    WSOnConnectPatch:
      type: object
      properties:
        send:
          type: string
        delay:
          $ref: "#/components/schemas/Duration"

    # ── gRPC ──────────────────────────────────────────────────────────────────
    GRPCError:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          description: gRPC status code
        message:
          type: string

    GRPCMock:
      type: object
      required: [method]
      properties:
        id:
          type: string
        method:
          type: string
          description: Fully-qualified gRPC method name (e.g. SayHello or pkg.Service/Method)
        response:
          type: object
          additionalProperties: true
          description: Response payload fields
        error:
          $ref: "#/components/schemas/GRPCError"
        delay:
          $ref: "#/components/schemas/Duration"

    GRPCResponsePatch:
      type: object
      properties:
        response:
          type: object
          additionalProperties: true
        error:
          $ref: "#/components/schemas/GRPCError"
        delay:
          $ref: "#/components/schemas/Duration"

    # ── GraphQL ───────────────────────────────────────────────────────────────
    GraphQLError:
      type: object
      required: [message]
      properties:
        message:
          type: string
        path:
          type: array
          items:
            type: string
        extensions:
          type: object
          additionalProperties: true

    GraphQLMock:
      type: object
      properties:
        id:
          type: string
        operation_type:
          type: string
          enum: [query, mutation, subscription]
          description: Operation type filter (omit for any)
        operation_name:
          type: string
          description: Operation name filter (exact or wildcard; omit for any)
        response:
          type: object
          additionalProperties: true
          description: Data fields returned under the "data" key
        errors:
          type: array
          items:
            $ref: "#/components/schemas/GraphQLError"
        delay:
          $ref: "#/components/schemas/Duration"
        state:
          $ref: "#/components/schemas/StateCondition"

    # ── TCP ───────────────────────────────────────────────────────────────────
    TCPMock:
      type: object
      required: [match, response]
      properties:
        id:
          type: string
        match:
          type: string
          description: Exact string, "re:…" regex, or "hex:…" hex bytes
        response:
          type: string
          description: Plain string or "hex:…" hex bytes
        close:
          type: boolean
          description: Close connection after responding
        delay:
          $ref: "#/components/schemas/Duration"
        state:
          $ref: "#/components/schemas/StateCondition"

    # ── Redis ─────────────────────────────────────────────────────────────────
    RedisResponse:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [string, bulk, integer, array, error, nil]
        value:
          description: Response value (type depends on `type` field)

    RedisMock:
      type: object
      required: [command, response]
      properties:
        id:
          type: string
        command:
          type: string
          description: Redis command (e.g. GET, SET, HGET)
          example: GET
        key:
          type: string
          description: Key to match (exact, "re:…" regex, or "*" wildcard)
        response:
          $ref: "#/components/schemas/RedisResponse"
        delay:
          $ref: "#/components/schemas/Duration"
        state:
          $ref: "#/components/schemas/StateCondition"

    # ── SMTP ──────────────────────────────────────────────────────────────────
    SMTPRule:
      type: object
      required: [action]
      properties:
        id:
          type: string
        from:
          type: string
          description: Sender address filter (exact, "re:…", or wildcard)
        to:
          type: string
          description: Recipient filter
        subject:
          type: string
          description: Subject filter
        action:
          type: string
          enum: [accept, reject]
        message:
          type: string
          description: SMTP error message when action is "reject"

    ReceivedEmail:
      type: object
      properties:
        id:
          type: string
        from:
          type: string
        to:
          type: array
          items:
            type: string
        subject:
          type: string
        body:
          type: string
        received_at:
          type: string
          format: date-time

    # ── MQTT ──────────────────────────────────────────────────────────────────
    MQTTResponse:
      type: object
      required: [payload]
      properties:
        topic:
          type: string
          description: Publish topic (empty = <incoming>/response)
        payload:
          type: string
        qos:
          type: integer
          minimum: 0
          maximum: 2
        retain:
          type: boolean
        delay:
          $ref: "#/components/schemas/Duration"

    MQTTMock:
      type: object
      required: [topic]
      properties:
        id:
          type: string
        topic:
          type: string
          description: MQTT topic pattern (supports + and # wildcards)
        response:
          $ref: "#/components/schemas/MQTTResponse"
        state:
          $ref: "#/components/schemas/StateCondition"

    # ── DNS / AMQP / Kafka / LDAP / IMAP / FTP / Memcached / STOMP / CoAP / SIP ─
    DNSMock:
      type: object
      required: [name, type]
      properties:
        id:
          type: string
        name:
          type: string
          description: DNS name to match (supports * wildcards)
        type:
          type: string
          enum: [A, AAAA, CNAME, MX, TXT, PTR, SRV, NS]
        records:
          type: array
          items:
            type: string
          description: Record values; MX uses "<priority> <host>", SRV uses "<priority> <weight> <port> <target>"
        ttl:
          type: integer
          minimum: 0
        delay:
          $ref: "#/components/schemas/Duration"
        state:
          $ref: "#/components/schemas/StateCondition"

    AMQPResponse:
      type: object
      required: [body]
      properties:
        exchange:
          type: string
        routing_key:
          type: string
        body:
          type: string

    AMQPMock:
      type: object
      properties:
        id:
          type: string
        exchange:
          type: string
        routing_key:
          type: string
          description: "Routing key filter (exact, wildcard, or re: regex)"
        response:
          $ref: "#/components/schemas/AMQPResponse"
        delay:
          $ref: "#/components/schemas/Duration"
        state:
          $ref: "#/components/schemas/StateCondition"

    ReceivedAMQPMessage:
      type: object
      properties:
        id:
          type: string
        exchange:
          type: string
        routing_key:
          type: string
        body:
          type: string
        timestamp:
          type: string
          format: date-time

    KafkaRecord:
      type: object
      required: [value]
      properties:
        key:
          type: string
        value:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string

    KafkaMock:
      type: object
      required: [topic]
      properties:
        id:
          type: string
        topic:
          type: string
        records:
          type: array
          items:
            $ref: "#/components/schemas/KafkaRecord"
        delay:
          $ref: "#/components/schemas/Duration"
        state:
          $ref: "#/components/schemas/StateCondition"

    ProducedKafkaMessage:
      type: object
      properties:
        id:
          type: string
        topic:
          type: string
        partition:
          type: integer
        key:
          type: string
        value:
          type: string
        timestamp:
          type: string
          format: date-time

    LDAPMock:
      type: object
      required: [base_dn, attributes]
      properties:
        id:
          type: string
        base_dn:
          type: string
        filter:
          type: string
        attributes:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        delay:
          $ref: "#/components/schemas/Duration"
        state:
          $ref: "#/components/schemas/StateCondition"

    IMAPMessage:
      type: object
      required: [seq_num, from, to, subject, body]
      properties:
        seq_num:
          type: integer
        uid:
          type: integer
          minimum: 0
        from:
          type: string
        to:
          type: string
        subject:
          type: string
        body:
          type: string
        flags:
          type: array
          items:
            type: string
        date:
          type: string

    IMAPMailbox:
      type: object
      required: [name, messages]
      properties:
        id:
          type: string
        name:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/IMAPMessage"

    FTPFile:
      type: object
      required: [path, content]
      properties:
        id:
          type: string
        path:
          type: string
        content:
          type: string
        permissions:
          type: string
        size:
          type: integer

    MemcachedResponse:
      type: object
      properties:
        value:
          type: string
        flags:
          type: integer
          minimum: 0
        status:
          type: string

    MemcachedMock:
      type: object
      required: [command, response]
      properties:
        id:
          type: string
        command:
          type: string
        key:
          type: string
          description: "Key filter (exact, wildcard, or re: regex)"
        response:
          $ref: "#/components/schemas/MemcachedResponse"
        delay:
          $ref: "#/components/schemas/Duration"
        state:
          $ref: "#/components/schemas/StateCondition"

    STOMPResponse:
      type: object
      required: [body]
      properties:
        destination:
          type: string
        body:
          type: string
        content_type:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string

    STOMPMock:
      type: object
      required: [destination]
      properties:
        id:
          type: string
        destination:
          type: string
          description: "Destination filter (exact, wildcard, or re: regex)"
        response:
          $ref: "#/components/schemas/STOMPResponse"
        delay:
          $ref: "#/components/schemas/Duration"
        state:
          $ref: "#/components/schemas/StateCondition"

    ReceivedSTOMPMessage:
      type: object
      properties:
        id:
          type: string
        destination:
          type: string
        body:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        timestamp:
          type: string
          format: date-time

    CoAPResponse:
      type: object
      required: [code]
      properties:
        code:
          type: string
        payload:
          type: string
        content_format:
          type: integer

    CoAPMock:
      type: object
      required: [method, path, response]
      properties:
        id:
          type: string
        method:
          type: string
          enum: [GET, POST, PUT, DELETE]
        path:
          type: string
          description: "Path filter (exact, wildcard, or re: regex)"
        response:
          $ref: "#/components/schemas/CoAPResponse"
        delay:
          $ref: "#/components/schemas/Duration"
        state:
          $ref: "#/components/schemas/StateCondition"

    SIPResponse:
      type: object
      required: [status]
      properties:
        status:
          type: integer
        reason:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        body:
          type: string

    SIPMock:
      type: object
      required: [method, response]
      properties:
        id:
          type: string
        method:
          type: string
        uri:
          type: string
          description: "URI filter (exact, wildcard, or re: regex)"
        response:
          $ref: "#/components/schemas/SIPResponse"
        delay:
          $ref: "#/components/schemas/Duration"
        state:
          $ref: "#/components/schemas/StateCondition"

    # ── Scenarios ─────────────────────────────────────────────────────────────
    MockPatch:
      type: object
      required: [mock_id]
      properties:
        mock_id:
          type: string
        status:
          type: integer
        headers:
          type: object
          additionalProperties:
            type: string
        body:
          type: string
        delay:
          $ref: "#/components/schemas/Duration"
        disabled:
          type: boolean
          description: If true, the mock is disabled while this scenario is active

    Scenario:
      type: object
      required: [name]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        patches:
          type: array
          items:
            $ref: "#/components/schemas/MockPatch"
        faults:
          $ref: "#/components/schemas/ProtocolFaults"

    # ── Fault Injection ───────────────────────────────────────────────────────
    DNSFault:
      type: object
      properties:
        delay:
          $ref: "#/components/schemas/Duration"
        rcode:
          type: string
          enum: [NXDOMAIN, SERVFAIL, REFUSED, NOTIMP, FORMERR]
        error_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    GRPCFault:
      type: object
      properties:
        delay:
          $ref: "#/components/schemas/Duration"
        code:
          type: string
          enum: [UNAVAILABLE, NOT_FOUND, DEADLINE_EXCEEDED, PERMISSION_DENIED, RESOURCE_EXHAUSTED, INTERNAL]
        message:
          type: string
        error_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    HTTPFault:
      type: object
      properties:
        delay:
          $ref: "#/components/schemas/Duration"
        status:
          type: integer
        body:
          type: string
        error_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    WebSocketFault:
      type: object
      properties:
        delay:
          $ref: "#/components/schemas/Duration"
        close_code:
          type: integer
        message:
          type: string
        error_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    TCPFault:
      type: object
      properties:
        delay:
          $ref: "#/components/schemas/Duration"
        response:
          type: string
        error_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    RedisFault:
      type: object
      properties:
        delay:
          $ref: "#/components/schemas/Duration"
        error:
          type: string
        error_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    MQTTFault:
      type: object
      properties:
        delay:
          $ref: "#/components/schemas/Duration"
        error_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    SMTPFault:
      type: object
      properties:
        delay:
          $ref: "#/components/schemas/Duration"
        code:
          type: integer
        message:
          type: string
        error_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    SNMPFault:
      type: object
      properties:
        delay:
          $ref: "#/components/schemas/Duration"
        message:
          type: string
        error_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    AMQPFault:
      type: object
      properties:
        delay:
          $ref: "#/components/schemas/Duration"
        error_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    KafkaFault:
      type: object
      properties:
        delay:
          $ref: "#/components/schemas/Duration"
        error_code:
          type: integer
        error_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    LDAPFault:
      type: object
      properties:
        delay:
          $ref: "#/components/schemas/Duration"
        result_code:
          type: integer
        message:
          type: string
        error_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    IMAPFault:
      type: object
      properties:
        delay:
          $ref: "#/components/schemas/Duration"
        response:
          type: string
          enum: [NO, BAD, BYE]
        message:
          type: string
        error_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    FTPFault:
      type: object
      properties:
        delay:
          $ref: "#/components/schemas/Duration"
        code:
          type: integer
        message:
          type: string
        error_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    MemcachedFault:
      type: object
      properties:
        delay:
          $ref: "#/components/schemas/Duration"
        error_type:
          type: string
          enum: [SERVER_ERROR, CLIENT_ERROR]
        message:
          type: string
        error_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    STOMPFault:
      type: object
      properties:
        delay:
          $ref: "#/components/schemas/Duration"
        message:
          type: string
        error_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    CoAPFault:
      type: object
      properties:
        delay:
          $ref: "#/components/schemas/Duration"
        code:
          type: string
          enum: ["4.01", "4.03", "4.04", "5.00", "5.03"]
        error_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    SIPFault:
      type: object
      properties:
        delay:
          $ref: "#/components/schemas/Duration"
        status:
          type: integer
        reason:
          type: string
        error_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1

    ProtocolFaults:
      type: object
      description: Active direct or scenario fault configs by protocol
      properties:
        http:
          $ref: "#/components/schemas/HTTPFault"
        graphql:
          $ref: "#/components/schemas/HTTPFault"
        websocket:
          $ref: "#/components/schemas/WebSocketFault"
        grpc:
          $ref: "#/components/schemas/GRPCFault"
        tcp:
          $ref: "#/components/schemas/TCPFault"
        redis:
          $ref: "#/components/schemas/RedisFault"
        mqtt:
          $ref: "#/components/schemas/MQTTFault"
        smtp:
          $ref: "#/components/schemas/SMTPFault"
        snmp:
          $ref: "#/components/schemas/SNMPFault"
        dns:
          $ref: "#/components/schemas/DNSFault"
        amqp:
          $ref: "#/components/schemas/AMQPFault"
        kafka:
          $ref: "#/components/schemas/KafkaFault"
        ldap:
          $ref: "#/components/schemas/LDAPFault"
        imap:
          $ref: "#/components/schemas/IMAPFault"
        ftp:
          $ref: "#/components/schemas/FTPFault"
        memcached:
          $ref: "#/components/schemas/MemcachedFault"
        stomp:
          $ref: "#/components/schemas/STOMPFault"
        coap:
          $ref: "#/components/schemas/CoAPFault"
        sip:
          $ref: "#/components/schemas/SIPFault"

    # ── SNMP ──────────────────────────────────────────────────────────────────
    SNMPMock:
      type: object
      required: [id, oid, type, value]
      properties:
        id:
          type: string
          description: Unique identifier for this mock
        oid:
          type: string
          description: OID in dotted-decimal notation (e.g. "1.3.6.1.2.1.1.1.0")
        type:
          type: string
          enum: [string, octetstring, integer, int, gauge32, counter32, counter64, timeticks, ipaddress, objectidentifier, oid]
          description: SNMP data type for this OID
        value:
          description: The value to return for GET requests (can be string, integer, or float)

    SNMPTrapBinding:
      type: object
      required: [oid, type, value]
      properties:
        oid:
          type: string
          description: OID in dotted-decimal notation
        type:
          type: string
          description: SNMP data type (same values as SNMPMock.type)
        value:
          description: Variable binding value

    SNMPTrap:
      type: object
      required: [id, target, oid]
      properties:
        id:
          type: string
          description: Unique identifier for this trap configuration
        target:
          type: string
          description: "Destination host:port for the trap UDP datagram (e.g. \"127.0.0.1:1162\")"
        version:
          type: string
          enum: ["1", "2c", "3"]
          default: "2c"
          description: SNMP version for the outbound trap
        community:
          type: string
          default: "public"
          description: Community string (v1/v2c)
        oid:
          type: string
          description: Trap OID / enterprise OID
        bindings:
          type: array
          items:
            $ref: "#/components/schemas/SNMPTrapBinding"
          description: Variable bindings to include in the trap PDU

    SNMPUser:
      type: object
      required: [username]
      properties:
        username:
          type: string
        auth_protocol:
          type: string
          enum: [md5, sha, sha224, sha256, sha384, sha512]
          default: md5
        auth_passphrase:
          type: string
          format: password
        priv_protocol:
          type: string
          enum: [des, aes, aes192, aes256]
          default: des
        priv_passphrase:
          type: string
          format: password
