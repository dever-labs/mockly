name: Python client CI

on:
  push:
    branches: [main]
    paths:
      - 'clients/python/**'
      - 'clients/python-testcontainers/**'
  pull_request:
    paths:
      - 'clients/python/**'
      - 'clients/python-testcontainers/**'
  workflow_dispatch:

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: clients/python

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'

      - name: Install package
        run: pip install -e .

      - name: Install dev dependencies
        run: pip install pytest

      - name: Test
        run: pytest

  ci-testcontainers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: clients/python-testcontainers

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'

      - name: Install package
        run: pip install -e .

      - name: Install dev dependencies
        run: pip install pytest

      - name: Test
        run: pytest
