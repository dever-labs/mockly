name: Go client CI

on:
  push:
    branches: [main]
    paths:
      - 'clients/go/**'
  pull_request:
    paths:
      - 'clients/go/**'

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/go

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: clients/go/go.mod

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...
