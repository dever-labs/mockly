name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the problem you're trying to solve, not just the solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that Mockly doesn't support today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe your ideal implementation. Config examples, API shapes, or pseudocode are helpful.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you found any workarounds or alternative approaches?
    validations:
      required: false

  - type: dropdown
    id: protocol
    attributes:
      label: Related protocol (if applicable)
      options:
        - HTTP
        - WebSocket
        - gRPC
        - GraphQL
        - TCP
        - Redis
        - SMTP
        - MQTT
        - Management API
        - UI
        - General / other
    validations:
      required: false
